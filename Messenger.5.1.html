<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Pro - Chat Application</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        :root {
            /* Discord Dark Theme */
            --bg-primary: #36393f;
            --bg-secondary: #2f3136;
            --bg-tertiary: #202225;
            --bg-hover: #40444b;
            --text-primary: #dcddde;
            --text-secondary: #b9bbbe;
            --text-tertiary: #72767d;
            --border-color: #202225;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --success: #43b581;
            --danger: #f04747;
            --warning: #faa61a;
        }

        html.light {
            --bg-primary: #f2f2f2;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f9f9f9;
            --bg-hover: #f0f0f0;
            --text-primary: #2c2f33;
            --text-secondary: #424549;
            --text-tertiary: #72767d;
            --border-color: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-hover);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        /* Animations */
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .slide-in { animation: slideIn 0.3s ease-out; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        .scale-in { animation: scaleIn 0.3s ease-out; }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            background: transparent;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .btn-icon.active {
            background: var(--accent);
            color: white;
        }

        /* Input */
        .input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 4px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(88, 101, 242, 0.2);
        }

        .input::placeholder {
            color: var(--text-tertiary);
        }

        /* Layout */
        .container {
            display: flex;
            height: 100vh;
            background: var(--bg-primary);
        }

        .sidebar {
            width: 360px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        /* Header */
        .header {
            padding: 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent);
        }

        /* Contacts Section */
        .section-header {
            padding: 16px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-tertiary);
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--border-color);
        }

        .add-contact-form {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
        }

        .add-contact-form input {
            flex: 1;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            padding: 8px 16px;
            margin: 4px 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .contact-item:hover {
            background: var(--bg-hover);
            border-left-color: var(--accent);
        }

        .contact-item.active {
            background: rgba(88, 101, 242, 0.2);
            border-left-color: var(--accent);
        }

        .contact-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5865f2, #7289da);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0;
            position: relative;
        }

        .contact-avatar.online::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 14px;
            height: 14px;
            background: var(--success);
            border: 2px solid var(--bg-secondary);
            border-radius: 50%;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-name {
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-status {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        /* Chat Area */
        .chat-header {
            padding: 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-tertiary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .message-group {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease-out;
        }

        .message-group.sent {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 60%;
            padding: 8px 12px;
            border-radius: 8px;
            word-wrap: break-word;
            position: relative;
        }

        .message-bubble.received {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .message-bubble.sent {
            background: var(--accent);
            color: white;
        }

        .message-time {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        .message-content {
            font-size: 15px;
            line-height: 1.4;
        }

        /* Input Area */
        .input-area {
            padding: 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-actions {
            display: flex;
            gap: 4px;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(2px);
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: scaleIn 0.3s ease-out;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .modal-content {
            margin-bottom: 20px;
        }

        .modal-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .hidden { display: none !important; }

        /* Alerts */
        .alert {
            position: fixed;
            bottom: 16px;
            right: 16px;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            max-width: 400px;
            animation: slideIn 0.3s ease-out;
            z-index: 50;
        }

        .alert.success {
            border-left: 4px solid var(--success);
            color: var(--success);
        }

        .alert.error {
            border-left: 4px solid var(--danger);
            color: var(--danger);
        }

        .alert.info {
            border-left: 4px solid var(--accent);
            color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 100%; }
            .main { display: none; }
            .container.chat-open .sidebar { display: none; }
            .container.chat-open .main { display: flex; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="header">
            <div class="header-title">💬 Messenger</div>
            <button class="btn-icon" id="theme-btn" title="切换主题">
                <i class="fas fa-moon"></i>
            </button>
        </div>

        <div style="padding: 16px; border-bottom: 1px solid var(--border-color);">
            <input type="text" class="input" id="search-input" placeholder="🔍 搜索联系人...">
        </div>

        <div class="add-contact-form">
            <input type="text" class="input" id="user-id-input" placeholder="输入用户ID (user_123...)">
            <button class="btn btn-primary" id="add-btn">添加</button>
        </div>

        <div class="section-header">联系人</div>

        <div class="contacts-list" id="contacts-list">
            <div style="padding: 32px 16px; text-align: center; color: var(--text-tertiary);">
                暂无联系人，添加一个开始聊天吧
            </div>
        </div>
    </div>

    <!-- Main Chat -->
    <div class="main hidden" id="chat-panel">
        <div class="chat-header">
            <div class="chat-info">
                <div class="contact-avatar" id="chat-avatar" style="width: 40px; height: 40px; font-size: 14px;">U</div>
                <div>
                    <div class="contact-name" id="chat-name">Select a contact</div>
                    <div class="contact-status" id="chat-status">Offline</div>
                </div>
            </div>
            <button class="btn-icon" id="close-chat-btn" title="关闭">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="messages-area" id="messages-area">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <div>选择一个联系人开始聊天</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <div style="display: flex; gap: 8px;">
                    <input type="text" class="input" id="message-input" placeholder="输入消息..." style="flex: 1;">
                    <button class="btn-icon" id="send-btn" title="发送">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="input-actions">
                    <button class="btn-icon" id="image-btn" title="发送图片">
                        <i class="fas fa-image"></i>
                    </button>
                    <button class="btn-icon" id="emoji-btn" title="表情">
                        <i class="fas fa-smile"></i>
                    </button>
                    <button class="btn-icon" id="voice-btn" title="语音消息">
                        <i class="fas fa-microphone"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div class="main" id="empty-panel" style="align-items: center; justify-content: center;">
        <div style="text-align: center;">
            <div style="font-size: 64px; margin-bottom: 16px;">👋</div>
            <div style="font-size: 24px; font-weight: 700; margin-bottom: 8px;">欢迎使用 Messenger</div>
            <div style="color: var(--text-tertiary);">从左侧添加联系人或选择现有联系人开始聊天</div>
        </div>
    </div>
</div>

<!-- Theme Modal -->
<div id="theme-modal" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-title">选择主题</div>
        <div class="modal-content">
            <button class="btn btn-secondary" style="width: 100%; margin-bottom: 8px;" id="theme-dark">🌙 深色模式</button>
            <button class="btn btn-secondary" style="width: 100%;" id="theme-light">☀️ 浅色模式</button>
        </div>
    </div>
</div>

<!-- Hidden Elements -->
<input type="file" id="image-input" accept="image/*" style="display: none;">

<script>
    class MessengerApp {
        constructor() {
            this.currentContact = null;
            this.contacts = this.loadContacts();
            this.messages = this.loadMessages();
            this.init();
        }

        init() {
            this.bindEvents();
            this.renderContacts();
            this.loadTheme();
        }

        bindEvents() {
            // Add contact
            document.getElementById('add-btn').addEventListener('click', () => this.addContact());
            document.getElementById('user-id-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') this.addContact();
            });

            // Search
            document.getElementById('search-input').addEventListener('input', (e) => {
                this.filterContacts(e.target.value);
            });

            // Theme
            document.getElementById('theme-btn').addEventListener('click', () => {
                document.getElementById('theme-modal').classList.toggle('hidden');
            });
            document.getElementById('theme-dark').addEventListener('click', () => {
                this.setTheme('dark');
                document.getElementById('theme-modal').classList.add('hidden');
            });
            document.getElementById('theme-light').addEventListener('click', () => {
                this.setTheme('light');
                document.getElementById('theme-modal').classList.add('hidden');
            });

            // Chat
            document.getElementById('close-chat-btn').addEventListener('click', () => this.closeChat());
            document.getElementById('send-btn').addEventListener('click', () => this.sendMessage());
            document.getElementById('message-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') this.sendMessage();
            });

            // Media
            document.getElementById('image-btn').addEventListener('click', () => {
                document.getElementById('image-input').click();
            });
            document.getElementById('image-input').addEventListener('change', (e) => {
                this.sendImage(e);
            });

            document.getElementById('voice-btn').addEventListener('click', () => {
                this.sendVoice();
            });

            document.getElementById('emoji-btn').addEventListener('click', () => {
                this.insertEmoji();
            });
        }

        addContact() {
            const input = document.getElementById('user-id-input');
            const userId = input.value.trim();

            // Validate ID format
            if (!userId.match(/^user_[a-zA-Z0-9]{6,}$/)) {
                this.showAlert('用户ID格式错误，应为: user_123abc', 'error');
                return;
            }

            // Check if already exists
            if (this.contacts.find(c => c.id === userId)) {
                this.showAlert('该联系人已存在', 'error');
                return;
            }

            const contact = {
                id: userId,
                name: userId,
                status: 'online',
                lastSeen: new Date().toISOString()
            };

            this.contacts.push(contact);
            this.saveContacts();
            this.renderContacts();
            input.value = '';
            this.showAlert(`已添加联系人 ${userId}`, 'success');
        }

        renderContacts() {
            const list = document.getElementById('contacts-list');

            if (this.contacts.length === 0) {
                list.innerHTML = `
                    <div style="padding: 32px 16px; text-align: center; color: var(--text-tertiary);">
                        暂无联系人，添加一个开始聊天吧
                    </div>
                `;
                return;
            }

            list.innerHTML = this.contacts.map(contact => `
                <div class="contact-item ${this.currentContact?.id === contact.id ? 'active' : ''}" 
                     onclick="app.openChat('${contact.id}')">
                    <div class="contact-avatar ${contact.status === 'online' ? 'online' : ''}">
                        ${contact.name.substring(0, 2).toUpperCase()}
                    </div>
                    <div class="contact-info">
                        <div class="contact-name">${contact.name}</div>
                        <div class="contact-status">${contact.status === 'online' ? '在线' : '离线'}</div>
                    </div>
                </div>
            `).join('');
        }

        openChat(contactId) {
            const contact = this.contacts.find(c => c.id === contactId);
            if (!contact) return;

            this.currentContact = contact;
            document.getElementById('chat-name').textContent = contact.name;
            document.getElementById('chat-status').textContent = contact.status === 'online' ? '在线' : '离线';
            document.getElementById('chat-avatar').textContent = contact.name.substring(0, 2).toUpperCase();

            document.getElementById('empty-panel').classList.add('hidden');
            document.getElementById('chat-panel').classList.remove('hidden');
            this.renderMessages();
            this.renderContacts();
        }

        closeChat() {
            this.currentContact = null;
            document.getElementById('chat-panel').classList.add('hidden');
            document.getElementById('empty-panel').classList.remove('hidden');
            document.getElementById('message-input').value = '';
            this.renderContacts();
        }

        sendMessage() {
            if (!this.currentContact) return;

            const input = document.getElementById('message-input');
            const text = input.value.trim();

            if (!text) return;

            if (!this.messages[this.currentContact.id]) {
                this.messages[this.currentContact.id] = [];
            }

            this.messages[this.currentContact.id].push({
                type: 'text',
                content: text,
                sent: true,
                timestamp: new Date().toISOString()
            });

            this.saveMessages();
            this.renderMessages();
            input.value = '';
            input.focus();
        }

        sendImage(event) {
            if (!this.currentContact) {
                this.showAlert('请先选择一个联系人', 'error');
                return;
            }

            const files = Array.from(event.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (!this.messages[this.currentContact.id]) {
                        this.messages[this.currentContact.id] = [];
                    }

                    this.messages[this.currentContact.id].push({
                        type: 'image',
                        content: e.target.result,
                        sent: true,
                        timestamp: new Date().toISOString()
                    });

                    this.saveMessages();
                    this.renderMessages();
                };
                reader.readAsDataURL(file);
            });

            event.target.value = '';
        }

        sendVoice() {
            if (!this.currentContact) {
                this.showAlert('请先选择一个联系人', 'error');
                return;
            }

            this.showAlert('🎤 开始录音（本演示中为模拟消息）', 'info');

            if (!this.messages[this.currentContact.id]) {
                this.messages[this.currentContact.id] = [];
            }

            setTimeout(() => {
                this.messages[this.currentContact.id].push({
                    type: 'voice',
                    duration: '0:' + Math.floor(Math.random() * 60).toString().padStart(2, '0'),
                    sent: true,
                    timestamp: new Date().toISOString()
                });

                this.saveMessages();
                this.renderMessages();
                this.showAlert('✅ 语音消息已发送', 'success');
            }, 2000);
        }

        insertEmoji() {
            const emojis = ['😊', '❤️', '😂', '🎉', '🔥', '👍', '💯', '😍'];
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];
            const input = document.getElementById('message-input');
            input.value += emoji;
            input.focus();
        }

        renderMessages() {
            const area = document.getElementById('messages-area');

            if (!this.currentContact) return;

            const msgs = this.messages[this.currentContact.id] || [];

            if (msgs.length === 0) {
                area.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👋</div>
                        <div>开始与 ${this.currentContact.name} 聊天</div>
                    </div>
                `;
                return;
            }

            area.innerHTML = msgs.map(msg => {
                let content = '';
                if (msg.type === 'text') {
                    content = `<div class="message-content">${this.escapeHtml(msg.content)}</div>`;
                } else if (msg.type === 'image') {
                    content = `<img src="${msg.content}" style="max-width: 300px; border-radius: 8px;">`;
                } else if (msg.type === 'voice') {
                    content = `<div class="message-content">🎤 语音消息 (${msg.duration})</div>`;
                }

                return `
                    <div class="message-group ${msg.sent ? 'sent' : ''}">
                        <div>
                            <div class="message-bubble ${msg.sent ? 'sent' : 'received'}">
                                ${content}
                            </div>
                            <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString('zh-CN')}</div>
                        </div>
                    </div>
                `;
            }).join('');

            area.scrollTop = area.scrollHeight;
        }

        filterContacts(search) {
            const list = document.getElementById('contacts-list');
            const filtered = this.contacts.filter(c => c.name.includes(search) || c.id.includes(search));

            if (filtered.length === 0) {
                list.innerHTML = `<div style="padding: 16px; text-align: center; color: var(--text-tertiary);">未找到匹配的联系人</div>`;
                return;
            }

            list.innerHTML = filtered.map(contact => `
                <div class="contact-item" onclick="app.openChat('${contact.id}')">
                    <div class="contact-avatar ${contact.status === 'online' ? 'online' : ''}">
                        ${contact.name.substring(0, 2).toUpperCase()}
                    </div>
                    <div class="contact-info">
                        <div class="contact-name">${contact.name}</div>
                        <div class="contact-status">${contact.status === 'online' ? '在线' : '离线'}</div>
                    </div>
                </div>
            `).join('');
        }

        setTheme(theme) {
            const html = document.documentElement;
            if (theme === 'light') {
                html.classList.add('light');
            } else {
                html.classList.remove('light');
            }
            localStorage.setItem('messenger-theme', theme);
        }

        loadTheme() {
            const theme = localStorage.getItem('messenger-theme') || 'dark';
            this.setTheme(theme);
        }

        showAlert(text, type = 'success') {
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.textContent = text;
            document.body.appendChild(alert);

            setTimeout(() => {
                alert.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => alert.remove(), 300);
            }, 3000);
        }

        saveContacts() {
            localStorage.setItem('messenger-contacts', JSON.stringify(this.contacts));
        }

        loadContacts() {
            return JSON.parse(localStorage.getItem('messenger-contacts')) || [];
        }

        saveMessages() {
            localStorage.setItem('messenger-messages', JSON.stringify(this.messages));
        }

        loadMessages() {
            return JSON.parse(localStorage.getItem('messenger-messages')) || {};
        }

        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    }

    // Init app
    const app = new MessengerApp();
</script>

</body>
</html>
