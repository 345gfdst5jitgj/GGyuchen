<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Pro - Professional Chat Platform</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3f 50%, #0f0f1e 100%);
            color: #e0e0e0;
            font-size: 15px;
            overflow: hidden;
            height: 100vh;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(148, 0, 211, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148, 0, 211, 0.5); }

        /* Animations */
        @keyframes slideIn { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Layout */
        .container { display: flex; height: 100vh; width: 100vw; }
        .hidden { display: none !important; }

        /* Login Screen */
        .login-screen {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3f 50%, #16213e 100%);
        }
        .login-box {
            background: rgba(30, 30, 60, 0.8); backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 0, 211, 0.3); border-radius: 20px;
            padding: 40px; width: 360px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: scaleIn 0.4s ease-out;
        }
        .login-title {
            font-size: 28px; font-weight: 800; margin-bottom: 8px;
            background: linear-gradient(135deg, #9400d3, #ff1493);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .login-subtitle { font-size: 14px; color: #888; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .label { font-size: 13px; font-weight: 600; color: #aaa; margin-bottom: 8px; display: block; text-transform: uppercase; }
        .input {
            width: 100%; padding: 12px 16px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(148, 0, 211, 0.2); border-radius: 10px; color: #e0e0e0;
            transition: all 0.3s ease;
        }
        .input:focus { outline: none; border-color: #9400d3; background: rgba(148, 0, 211, 0.1); }
        .btn { width: 100%; padding: 12px 16px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; text-transform: uppercase; transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(135deg, #9400d3, #ff1493); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(148, 0, 211, 0.4); }
        .error-msg { color: #ff6b6b; font-size: 13px; margin-top: 8px; display: none; }
        .error-msg.show { display: block; animation: fadeIn 0.3s ease-out; }

        /* Main App Sidebar */
        .sidebar {
            width: 320px; background: rgba(20, 20, 50, 0.9); backdrop-filter: blur(10px);
            border-right: 1px solid rgba(148, 0, 211, 0.1); display: flex; flex-direction: column;
            animation: slideIn 0.4s ease-out;
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(148, 0, 211, 0.1); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logo { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #9400d3, #ff1493); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-info { font-size: 12px; color: #aaa; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background: rgba(255, 107, 107, 0.1); color: #ff6b6b; border: 1px solid rgba(255, 107, 107, 0.3); padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .logout-btn:hover { background: rgba(255, 107, 107, 0.2); }
        .search-box { padding: 12px; }
        .search-input { width: 100%; padding: 10px 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(148, 0, 211, 0.2); border-radius: 8px; color: #e0e0e0; }
        .search-input:focus { outline: none; border-color: #9400d3; }
        .contacts-header { padding: 12px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #666; letter-spacing: 0.5px; }
        .contacts-list { flex: 1; overflow-y: auto; padding: 4px; }
        .contact-item { padding: 12px; margin: 4px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-radius: 8px; transition: all 0.2s; border-left: 3px solid transparent; }
        .contact-item:hover { background: rgba(148, 0, 211, 0.1); border-left-color: #9400d3; }
        .contact-item.active { background: rgba(148, 0, 211, 0.2); border-left-color: #ff1493; }
        .avatar { width: 36px; height: 36px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; background: linear-gradient(135deg, #5b21b6, #7c3aed); }
        .contact-info { flex: 1; }
        .contact-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
        .contact-status { font-size: 12px; color: #888; }

        /* Main Chat Window */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: rgba(10, 10, 25, 0.4); animation: fadeIn 0.5s ease-out; }
        .chat-header { padding: 20px; border-bottom: 1px solid rgba(148, 0, 211, 0.1); display: flex; align-items: center; gap: 15px; }
        .chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 70%; padding: 12px 16px; border-radius: 14px; line-height: 1.4; font-size: 14px; }
        .msg-inbound { background: rgba(255, 255, 255, 0.05); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .msg-outbound { background: linear-gradient(135deg, #7c3aed, #9400d3); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
        .chat-footer { padding: 20px; border-top: 1px solid rgba(148, 0, 211, 0.1); display: flex; gap: 12px; }
        .chat-footer .input { flex: 1; }
        .send-btn { width: auto; padding: 0 24px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. 登录界面 -->
        <div id="loginScreen" class="login-screen">
            <div class="login-box">
                <h1 class="login-title">Messenger Pro</h1>
                <p class="login-subtitle">Sign in to your professional workspace</p>
                <div class="form-group">
                    <label class="label">Username</label>
                    <input type="text" id="usernameInput" class="input" placeholder="Enter your name...">
                    <div id="loginError" class="error-msg">Please enter a valid username.</div>
                </div>
                <button id="loginBtn" class="btn btn-primary">Launch App</button>
            </div>
        </div>

        <!-- 2. 主应用界面 (初始隐藏) -->
        <div id="appScreen" class="container hidden">
            <!-- 侧边栏 -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <div class="header-top">
                        <span class="logo">MPro Platform</span>
                    </div>
                    <div class="user-info">
                        <span id="currentUserName">User: -</span>
                        <button id="logoutBtn" class="logout-btn">Logout</button>
                    </div>
                </div>
                <div class="search-box">
                    <input type="text" class="search-input" placeholder="Search contacts...">
                </div>
                <div class="contacts-header">Recent Chats</div>
                <div class="contacts-list" id="contactsList">
                    <!-- JS 动态渲染联系人列表 -->
                </div>
            </div>

            <!-- 右侧聊天窗口 -->
            <div class="chat-main">
                <div class="chat-header">
                    <div class="avatar" id="activeAvatar">A</div>
                    <div>
                        <div class="contact-name" id="activeChatName">Select a conversation</div>
                        <div class="contact-status" id="activeChatStatus">Offline</div>
                    </div>
                </div>
                <div class="chat-body" id="chatBody">
                    <div class="message msg-inbound" style="align-self: center; background: none; border: none; color: #666;">
                        Welcome! Pick a contact on the left to start encrypting messages.
                    </div>
                </div>
                <div class="chat-footer">
                    <input type="text" id="messageInput" class="input" placeholder="Type a secure message..." disabled>
                    <button id="sendBtn" class="btn btn-primary send-btn" disabled><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- 核心业务逻辑 -->
    <script>
        // 模拟联系人数据
        const mockContacts = [
            { id: 1, name: "Alex Rivera", avatar: "AR", status: "Active now", initialMsg: "Hey, did you review the project proposal?" },
            { id: 2, name: "Sarah Chen", avatar: "SC", status: "Away", initialMsg: "I will upload the financial logs in an hour." },
            { id: 3, name: "Dev Ops Team", avatar: "DO", status: "Active now", initialMsg: "Production server deployment successful." }
        ];

        // DOM 节点获取
        const loginScreen = document.getElementById('loginScreen');
        const appScreen = document.getElementById('appScreen');
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('usernameInput');
        const loginError = document.getElementById('loginError');
        const currentUserName = document.getElementById('currentUserName');
        const logoutBtn = document.getElementById('logoutBtn');
        const contactsList = document.getElementById('contactsList');
        
        const activeChatName = document.getElementById('activeChatName');
        const activeChatStatus = document.getElementById('activeChatStatus');
        const activeAvatar = document.getElementById('activeAvatar');
        const chatBody = document.getElementById('chatBody');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        let currentActiveContactId = null;

        // 1. 登录逻辑
        loginBtn.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            if (!username) {
                loginError.classList.add('show');
                return;
            }
            loginError.classList.remove('show');
            currentUserName.textContent = `@${username}`;
            
            // 切换屏幕
            loginScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');
            
            // 渲染列表
            renderContacts();
        });

        // 2. 登出逻辑
        logoutBtn.addEventListener('click', () => {
            appScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            usernameInput.value = '';
            resetChatWindow();
        });

        // 3. 渲染联系人列表
        function renderContacts() {
            contactsList.innerHTML = '';
            mockContacts.forEach(contact => {
                const item = document.createElement('div');
                item.className = `contact-item ${currentActiveContactId === contact.id ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="avatar">${contact.avatar}</div>
                    <div class="contact-info">
                        <div class="contact-name">${contact.name}</div>
                        <div class="contact-status">${contact.initialMsg}</div>
                    </div>
                `;
                item.addEventListener('click', () => switchContact(contact));
                contactsList.appendChild(item);
            });
        }

        // 4. 切换聊天目标
        function switchContact(contact) {
            currentActiveContactId = contact.id;
            renderContacts(); // 刷新选中状态样式

            // 更新聊天头部信息
            activeChatName.textContent = contact.name;
            activeChatStatus.textContent = contact.status;
            activeAvatar.textContent = contact.avatar;

            // 激活输入控件
            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();

            // 初始化聊天历史
            chatBody.innerHTML = `
                <div class="message msg-inbound">${contact.initialMsg}</div>
            `;
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        // 5. 发送消息逻辑
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            // 创建消息节点
            const msgNode = document.createElement('div');
            msgNode.className = 'message msg-outbound';
            msgNode.textContent = text;
            chatBody.appendChild(msgNode);

            // 清空输入框并滚动触底
            messageInput.value = '';
            chatBody.scrollTop = chatBody.scrollHeight;

            // 模拟 1 秒后对方自动回复
            setTimeout(() => {
                if (currentActiveContactId === contact.id) return; // 检查是否切走
                const replyNode = document.createElement('div');
                replyNode.className = 'message msg-inbound';
                replyNode.textContent = `[Auto-Reply] Received: "${text}"`;
                chatBody.appendChild(replyNode);
                chatBody.scrollTop = chatBody.scrollHeight;
            }, 1000);
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // 重置聊天窗
        function resetChatWindow() {
            currentActiveContactId = null;
            activeChatName.textContent = "Select a conversation";
            activeChatStatus.textContent = "Offline";
            activeAvatar.textContent = "?";
            chatBody.innerHTML = `<div class="message msg-inbound" style="align-self: center; background: none; border: none; color: #666;">Welcome! Pick a contact on the left to start encrypting messages.</div>`;
            messageInput.disabled = true;
            sendBtn.disabled = true;
        }
    </script>
</body>
</html>
