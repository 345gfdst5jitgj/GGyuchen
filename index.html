    <!-- ==================== 8. 核心加解密与全活数据交互核心逻辑引擎 ==================== -->
    <script>
        let socket;
        let localKeyPair = null;
        let localPublicKeyPem = "";
        let currentUserName = "";
        let isCryptoSupported = true; 
        
        let activeConversations = {}; 
        let currentLinkedNodeId = null;
        let typingTimeout;
        let db = null;

        // --- A. INDEXEDDB 本地固态持久化存储层 (全活) ---
        function initIndexedDB() {
            return new Promise((resolve) => {
                const request = window.indexedDB.open("MPro_Storage", 1);
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains("conversations")) {
                        database.createObjectStore("conversations", { keyPath: "id" });
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    loadLocalConversations().then(resolve);
                };
                request.onerror = () => {
                    console.warn("IndexedDB 拒绝挂载，切换为纯运行内存缓存模式");
                    resolve();
                };
            });
        }

        async function saveNodeToLocal(node) {
            if (!db) return;
            const tx = db.transaction("conversations", "readwrite");
            const store = tx.objectStore("conversations");
            store.put({ id: node.id, username: node.username, publicKey: node.publicKey, history: node.history });
        }

        function loadLocalConversations() {
            return new Promise((resolve) => {
                if (!db) return resolve();
                const tx = db.transaction("conversations", "readonly");
                const store = tx.objectStore("conversations");
                const req = store.getAll();
                req.onsuccess = () => {
                    req.result.forEach(item => {
                        activeConversations[item.id] = item;
                    });
                    resolve();
                };
                req.onerror = () => resolve();
            });
        }

        // --- B. WEB CRYPTO 非对称底层运算模块 (全活修复) ---
        async function initCryptoEngine() {
            try {
                if (!window.crypto || !window.crypto.subtle) throw new Error("缺少系统硬件安全环境");
                const keyPair = await window.crypto.subtle.generateKey(
                    { name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([0x01, 0x00, 0x01]), hash: "SHA-256" },
                    true, ["encrypt", ["decrypt"]]
                );
                const exportedPub = await window.crypto.subtle.exportKey("spki", keyPair.publicKey);
                const pem = btoa(String.fromCharCode(...new Uint8Array(exportedPub)));
