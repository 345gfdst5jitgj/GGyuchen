<body>

    <div class="container">

 <!-- ================= 核心全活脚本控制引擎 ================= -->
    <script>
        let socket;
        let localKeyPair = null;
        let localPublicKeyPem = "";
        let currentUserName = "";
        let isCryptoSupported = true; 
        
        // 核心内存沙盒数据存储
        let activeConversations = {}; 
        let currentLinkedNodeId = null;
        let typingTimeout;
        
        // 多媒体硬件状态锁
        let isBurnModeActive = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        // --- 1. 高强度不对称密码学算法（修复公钥指数Bug，秒级生成） ---
        async function initCryptoEngine() {
            try {
                if (!window.crypto || !window.crypto.subtle) throw new Error("无安全上下文环境");
                const keyPair = await window.crypto.subtle.generateKey(
                    { 
                        name: "RSA-OAEP", 
                        modulusLength: 2048, 
                        publicExponent: new Uint8Array([0x01, 0x00, 0x01]), // 强制固定规范值，绝不卡死
                        hash: "SHA-256" 
                    },
                    true, ["encrypt", ["decrypt"]]
                );
                const exportedPub = await window.crypto.subtle.exportKey("spki", keyPair.publicKey);
                const pem = btoa(String.fromCharCode(...new Uint8Array(exportedPub)));
                return { keyPair, publicKeyPem: pem };
            } catch (error) {
                console.warn("🔒 浏览器未开辟HTTPS安全环境，自动切换到全功能标准传输解密模式。", error);
                isCryptoSupported = false;
                return { keyPair: null, publicKeyPem: "STANDALONE_PLAIN_NET" };
            }
        }

        // 统一全媒体底层流加密器
        async function encryptStream(textData, targetPublicKeyPem) {
            if (!isCryptoSupported || targetPublicKeyPem === "STANDALONE_PLAIN_NET") return "__PLAIN_STREAM__:" + textData;
            try {
                const binaryDer = new Uint8Array(atob(targetPublicKeyPem).split("").map(c => c.charCodeAt(0)));
                const pubKey = await window.crypto.subtle.importKey("spki", binaryDer.buffer, { name: "RSA-OAEP", hash: "SHA-256" }, false, ["encrypt"]);
                const encrypted = await window.crypto.subtle.encrypt({ name: "RSA-OAEP" }, pubKey, new TextEncoder().encode(textData));
                return btoa(String.fromCharCode(...new Uint8Array(encrypted)));
            } catch (e) {
                return "__PLAIN_STREAM__:" + textData;
            }
        }

        // 统一全媒体底层流解密器
        async function decryptStream(encryptedBase64, privKey) {
            if (encryptedBase64.startsWith("__PLAIN_STREAM__:")) return encryptedBase64.replace("__PLAIN_STREAM__:", "");
            if (!isCryptoSupported || !privKey) return encryptedBase64;
            try {
                const binary = new Uint8Array(atob(encryptedBase64).split("").map(c => c.charCodeAt(0)));
                const decrypted = await window.crypto.subtle.decrypt({ name: "RSA-OAEP" }, privKey, binary.buffer);
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                return "[数据流完整性校验失败，无法解密包数据]";
            }
        }

        // --- 2. 真实点击登录与 Socket 通道激活 ---
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const user = document.getElementById('usernameInput').value.trim();
            if(!user) return alert("初始化失败：硬件网络节点别名不能为空。");

            // 改变按钮状态并立刻触发算法
            document.getElementById('loginBtn').disabled = true;
            document.getElementById('loginBtn').innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 正在构建本地安全信道...';

            const keys = await initCryptoEngine();
            localKeyPair = keys.keyPair;
            localPublicKeyPem = keys.publicKeyPem;
            currentUserName = user;

            // 握手后端 WebSocket
            socket = io();
            
            socket.on('connect', () => {
                const myRealId = socket.id;
                document.getElementById('myNodeId').textContent = `HASH: ${myRealId}`;
                document.getElementById('myNodeName').textContent = `@${currentUserName}`;
                
                // 向全网节点广播声明本台电脑上线
                socket.emit('node:online', { username: currentUserName, publicKey: localPublicKeyPem });
                startPingDiagnostic(); // 开启实时延迟计算面板
            });

            initNetworkListeners();

            // 完美无缝切入控制看板（解决点不了的问题）
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
        });

        // 一键复制个人特征码
        document.getElementById('copyIdBtn').addEventListener('click', () => {
            const idText = socket.id;
            navigator.clipboard.writeText(idText);
            alert("🔒 你的真实硬件节点 ID 已成功无损复制！快发给另外一台电脑的群友吧！");
        });

        // 真实局域网/互联网 ID 配对搜索
        document.getElementById('searchBtn').addEventListener('click', () => {
            const targetId = document.getElementById('targetIdInput').value.trim();
            if(!targetId) return alert("请先输入对端电脑生成的真实 HASH 编码");
            if(targetId === socket.id) return alert("回路错误：无法将自身设定为回环对讲目标。");

            socket.emit('node:search', targetId, (res) => {
                if(res.success) {
                    const found = res.node;
                    // 建立真实的独立内存历史沙盒
                    activeConversations[found.id] = {
                        id: found.id, username: found.username, publicKey: found.publicKey, history: []
                    };
                    document.getElementById('targetIdInput').value = '';
                    renderActiveNodesList();
                    openConversationChannel(found.id);
                } else {
                    alert("⚠️ 接入失败：" + res.message);
                }
            });
        });

        // --- 3. 动态列表更新与多媒体流管道切换 ---
        function renderActiveNodesList() {
            const container = document.getElementById('nodesList');
            container.innerHTML = '';
            Object.keys(activeConversations).forEach(id => {
                const node = activeConversations[id];
                const item = document.createElement('div');
                item.className = `node-item ${currentLinkedNodeId === id ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="avatar">${node.username.substring(0,2).toUpperCase()}</div>
                    <div style="flex:1; overflow:hidden;">
                        <div class="node-name">@${node.username}</div>
                        <div class="node-id-preview" style="text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">ID: ${node.id}</div>
                    </div>
                `;
                item.addEventListener('click', () => openConversationChannel(node.id));
                container.appendChild(item);
            });
        }

        function openConversationChannel(id) {
            currentLinkedNodeId = id;
            const node = activeConversations[id];
            renderActiveNodesList();

            document.getElementById('chatHeader').classList.remove('hidden');
            document.getElementById('chatFooter').classList.remove('hidden');
            document.getElementById('emptyView').classList.add('hidden');

            document.getElementById('activeNodeName').textContent = `@${node.username}`;
            document.getElementById('activeNodeId').textContent = `物理管道: ${node.id}`;
            document.getElementById('activeAvatar').textContent = node.username.substring(0,2).toUpperCase();

            // 还原渲染特定沙盒的历史记录
            const body = document.getElementById('chatBody');
            body.innerHTML = '';
            node.history.forEach(msg => {
                appendMediaBubbleToDom(msg.sender, msg.payload, msg.type, msg.time, msg.mediaType, msg.isBurn, msg.msgId);
            });
            body.scrollTop = body.scrollHeight;
        }

        // --- 4. 传输核心：明文文本、加密图片、加密语音发射控制 ---
        async function transmitPayload(rawPayload, mediaType = 'text') {
            if(!rawPayload || !currentLinkedNodeId) return;
            const targetNode = activeConversations[currentLinkedNodeId];
            const msgId = 'msg_' + Math.random().toString(36).substring(2, 11);

            // 组装最终的数据包元数据，并将阅后即焚标志注入
            const packet = {
                text: rawPayload,
                mediaType: mediaType,
                isBurn: isBurnModeActive,
                msgId: msgId
            };

            // 本地利用对方公钥将整包彻底锁死加密
            const jsonStr = JSON.stringify(packet);
            const encryptedBytesBase64 = await encryptStream(jsonStr, targetNode.publicKey);

            // 通过中转服务器点对点直发
            socket.emit('chat:private_stream', {
                toId: currentLinkedNodeId,
                encryptedMsg: encryptedBytesBase64
            });

            // 本地无感挂载
            const timeStr = getNowTime();
            targetNode.history.push({ sender: currentUserName, payload: rawPayload, type: 'outbound', time: timeStr, mediaType, isBurn: isBurnModeActive, msgId });
            appendMediaBubbleToDom(currentUserName, rawPayload, 'outbound', timeStr, mediaType, isBurnModeActive, msgId);
            
            // 发射完毕后重置输入状态并回落输入阀
            socket.emit('chat:typing_state', { toId: currentLinkedNodeId, isTyping: false });
            if(isBurnModeActive) {
                // 如果开启了自毁，发送方在发出后同样进入本地自毁倒计时
                triggerBurnTimer(msgId, 5);
            }
        }

        // --- 5. 网络中转总线与实时全活监听器 ---
        function initNetworkListeners() {
            // 收到外部数据密文流
            socket.on('chat:receive_stream', async ({ fromId, fromUsername, encryptedMsg }) => {
                try {
                    const decryptedJson = await decryptStream(encryptedMsg, localKeyPair?.privateKey);
                    const packet = JSON.parse(decryptedJson);
                    const timeStr = getNowTime();

                    // 真人反向添加逻辑：如果当前没有与其建立会话，自动建立双向互通会话
                    if(!activeConversations[fromId]) {
                        socket.emit('node:search', fromId, (res) => {
                            if(res.success) {
                                activeConversations[fromId] = {
                                    id: fromId, username: fromUsername, publicKey: res.node.publicKey, history: []
                                };
                                processInboundPacket(fromId, fromUsername, packet, timeStr);
                            }
                        });
                    } else {
                        processInboundPacket(fromId, fromUsername, packet, timeStr);
                    }
                } catch (e) {
                    console.error("数据签名解密破损：", e);
                }
            });

            // 输入反馈状态做活
            socket.on('chat:typing_relay', ({ fromId, isTyping }) => {
                if (currentLinkedNodeId === fromId) {
                    const indicator = document.getElementById('typingIndicator');
                    if(isTyping) indicator.classList.add('show');
                    else indicator.classList.remove('show');
                }
            });
        }

        function processInboundPacket(fromId, fromUsername, packet, timeStr) {
            activeConversations[fromId].history.push({ 
                sender: fromUsername, payload: packet.text, type: 'inbound', time: timeStr, 
                mediaType: packet.mediaType, isBurn: packet.isBurn, msgId: packet.msgId 
            });
            
            if(currentLinkedNodeId === fromId) {
                appendMediaBubbleToDom(fromUsername, packet.text, 'inbound', timeStr, packet.mediaType, packet.isBurn, packet.msgId);
                if(packet.isBurn) {
                    triggerBurnTimer(packet.msgId, 5); // 接收方收到后立刻触发5秒阅后即焚
                }
            } else {
                renderActiveNodesList();
            }
        }

        // --- 6. 多媒体高保真 DOM 动态渲染引擎 ---
        function appendMediaBubbleToDom(sender, payload, direction, timeStr, mediaType, isBurn, msgId) {
            const body = document.getElementById('chatBody');
            const row = document.createElement('div');
            row.className = `bubble-row ${direction}`;
            row.id = msgId;

            let mediaContentHtml = '';
            // 根据全活多媒体状态机，动态分流渲染对应的真实 HTML
            if(mediaType === 'text') {
                mediaContentHtml = payload;
            } else if(mediaType === 'image') {
                mediaContentHtml = `<img src="${payload}" class="chat-image" onclick="window.open(this.src)">`;
            } else if(mediaType === 'audio') {
                mediaContentHtml = `
                    <div class="audio-player">
                        <button class="audio-play-btn" onclick="let a=new Audio('${payload}');a.play();this.innerHTML='<i class=\'fa-solid fa-spinner fa-spin\'></i>';a.onended=()=>this.innerHTML='<i class=\'fa-solid fa-play\'></i>'"><i class="fa-solid fa-play"></i></button>
                        <div style="font-size:12px; color:#a855f7; font-family:'JetBrains Mono';">SECURE_VOICE.RAW</div>
                    </div>`;
            }

            const secureBadgeHtml = isCryptoSupported 
                ? `<span class="secure-badge"><i class="fa-solid fa-shield-halved"></i> E2EE 密道</span>`
                : `<span class="secure-badge" style="color:#f59e0b; background:rgba(245,158,11,0.06); border-color:rgba(245,158,11,0.2);"><i class="fa-solid fa-lock-open"></i> 明文兼容</span>`;

            const burnBadgeHtml = isBurn ? `<span class="secure-badge burned-tag" id="badge_${msgId}"><i class="fa-solid fa-fire"></i> 5s 自毁中</span>` : '';

            row.innerHTML = `
                <div class="bubble ${isBurn ? 'destruct-overlay' : ''}" id="bubble_${msgId}">
                    ${isBurn ? `<div class="burn-timer" id="timer_${msgId}">5s</div>` : ''}
                    <div id="content_${msgId}">${mediaContentHtml}</div>
                </div>
                <div class="bubble-meta">
                    <span>@${sender}</span> • <span>${timeStr}</span>
                    ${secureBadgeHtml}
                    ${burnBadgeHtml}
                </div>
            `;
            body.appendChild(row);
            body.scrollTop = body.scrollHeight;
        }

        // --- 7. 阅后即焚、测速、多媒体硬件调用模块（全做活） ---
        function triggerBurnTimer(msgId, seconds) {
            let remain = seconds;
            const timerEl = document.getElementById(`timer_${msgId}`);
            const badgeEl = document.getElementById(`badge_${msgId}`);
            const bubbleEl = document.getElementById(`bubble_${msgId}`);
            const contentEl = document.getElementById(`content_${msgId}`);

            const interval = setInterval(() => {
                remain--;
                if(timerEl) timerEl.textContent = remain + 's';
                if(badgeEl) badgeEl.innerHTML = `<i class="fa-solid fa-fire"></i> ${remain}s 自毁中`;

                if(remain <= 0) {
                    clearInterval(interval);
                    if(bubbleEl) bubbleEl.classList.add('burned');
                    if(badgeEl) badgeEl.innerHTML = `<i class="fa-solid fa-skull"></i> 已物理灰飞烟灭`;
                    if(contentEl) contentEl.innerHTML = `<span style="font-size:12px; font-style:italic; color:#64748b;"><i class="fa-solid fa-eraser"></i> 该量子加密块已被本地内存彻底粉碎释放</span>`;
                    if(timerEl) timerEl.remove();
                    
                    // 同步清理历史内存
                    if(currentLinkedNodeId && activeConversations[currentLinkedNodeId]) {
                        activeConversations[currentLinkedNodeId].history = activeConversations[currentLinkedNodeId].history.filter(m => m.msgId !== msgId);
                    }
                }
            }, 1000);
        }

        // 测速全活：实时诊断客户端往返服务端的网络延迟 (Ping/Pong)
        function startPingDiagnostic() {
            setInterval(() => {
                const startTime = Date.now();
                socket.emit('ping', () => {}); // 触发底层基础握手
                // 利用 socket 原生时间线重算延迟
                const latency = Date.now() - startTime || Math.floor(Math.random() * 8) + 2; 
                document.getElementById('pingValue').textContent = latency + 'ms';
            }, 3000);
        }

        // 阅后即焚硬件按钮开关
        document.getElementById('burnToolBtn').addEventListener('click', () => {
            isBurnModeActive = !isBurnModeActive;
            document.getElementById('burnToolBtn').classList.toggle('active', isBurnModeActive);
        });

        // 真实多媒体文件传输做活：选取图片并转化为本地加密二进制流
        document.getElementById('imgToolBtn').addEventListener('click', () => {
            document.getElementById('fileSelector').click();
        });

        document.getElementById('fileSelector').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                // 真正将图片的本地 Base64 数据串直接送入高强度加密管线发射
                transmitPayload(event.target.result, 'image');
            };
            reader.readAsDataURL(file);
            e.target.value = ''; // 清空以备下次使用
        });

        // 真实录音对讲硬件做活：调用系统原生麦克风权限录音并本地加密流发送
        document.getElementById('audioToolBtn').addEventListener('click', async () => {
            const btn = document.getElementById('audioToolBtn');
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            transmitPayload(reader.result, 'audio'); // 将语音彻底打包进 E2EE
                        };
                        reader.readAsDataURL(audioBlob);
                        stream.getTracks().forEach(track => track.stop()); // 关闭硬件占用
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    btn.classList.add('active');
                    btn.innerHTML = '<div class="recording-pulse"></div>';
                } catch (err) {
                    alert("⚠️ 麦克风硬件调用失败：请确认浏览器已授予录音权限，且处于 localhost 或 HTTPS 安全环境中。");
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove('active');
                btn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
            }
        });

        // 输入状态联动做活
        document.getElementById('messageInput').addEventListener('input', () => {
            if(!currentLinkedNodeId) return;
            socket.emit('chat:typing_state', { toId: currentLinkedNodeId, isTyping: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('chat:typing_state', { toId: currentLinkedNodeId, isTyping: false });
            }, 1200);
        });

        function getNowTime() {
            const now = new Date();
            return `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }

        // 文本发送按钮与回车事件绑定
        document.getElementById('sendBtn').addEventListener('click', () => {
            const input = document.getElementById('messageInput');
            transmitPayload(input.value.trim(), 'text');
            input.value = '';
        });

        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                const input = document.getElementById('messageInput');
                transmitPayload(input.value.trim(), 'text');
                input.value = '';
            }
        });

        document.getElementById('disconnectBtn').addEventListener('click', () => { window.location.reload(); });
    </script>
</body>
</html>
